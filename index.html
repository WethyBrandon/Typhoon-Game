@font-face {
  font-family: "Bungee Spice";

body {
  margin: 0;
  font-family: "Bungee Spice", sans-serif;

  background-color: cyan;

  /* polka dot pattern */
  background-image:
    radial-gradient(white 18%, transparent 20%),
    radial-gradient(white 18%, transparent 20%);

  background-size: 30px 30px;
  background-position: 0 0, 15px 15px;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  overflow: hidden;
}


    #master {
      width: 1250px;
      height: 800px;
      margin: auto;
      text-align: center;
      padding: 10px;

      background: rgba(0, 0, 0, 0.75);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);

      transform-origin: top center;
    }

    #wrapper {
      width: 100%;
      height: 100%;
      display: inline-block;

      background: rgba(255, 255, 255, 0.92);
      border-radius: 14px;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 36pt;
      margin: 10px 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }

    /* FIXED TABLE ALIGNMENT */
    table {
      border-spacing: 6px;
    }

    td {
      vertical-align: top;
      padding: 0;
    }

    /* TILE */
    .square1 {
      border: 2px solid rgba(0,0,0,0.2);
      background: linear-gradient(145deg, #d7f0ff, #b8e0f5);
      width: 64px;
      height: 64px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);

      display: flex;
      align-items: center;
      justify-content: center;

      position: relative;
      overflow: hidden;

      font-size: 12px;
      line-height: 1;
    }

    .square1:hover {
      transform: scale(1.05);
      transition: 0.15s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    /* BUTTONS */
    button {
      width: 100%;
      height: 100%;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    button:hover {
      filter: brightness(1.1);
      transform: scale(1.03);
    }

    /* IFRAME */
    #iframe {
      height: 598px;
      width: 576px;
      margin-top: 4px;

      border: 5px solid rgba(0,0,0,0.6);
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    footer {

      font-size: 10pt;
      opacity: 0.8;
    }

<script>
function handleClick(button) {
  button.disabled = true;
  button.innerText = "X";
  button.style.background = "gray";
  button.style.color = "white";
}

function handleClick2(button) {
  button.disabled = true;
  button.innerText = "🎊";
  button.style.background = "gold";
  button.style.color = "white";
}

function handleClick1(button) {
  button.disabled = true;
  button.innerText = "🌪️";
  button.style.backgroundColor = "red";
  button.style.color = "white";
}

function handleClick3(button) {
  button.disabled = true;
  button.innerText = "🌬️";
  button.style.backgroundColor = "red";
  button.style.color = "white";
}

function handleClick4(button) {
  button.disabled = true;
  button.innerText = "🥷🏼️";
  button.style.backgroundColor = "red";
  button.style.color = "white";
}

function handleClick5(button) {
  button.disabled = true;
  button.innerText = "🦖️";
  button.style.backgroundColor = "red";
  button.style.color = "white";
}

function handleClick6(button) {
  button.disabled = true;
  button.innerText = "🦋";
  button.style.background = "gold";
  button.style.color = "white";
}

function setURL(url) {
  document.getElementById('iframe').src = url;
}

function launchConfetti() {
  confetti({ particleCount: 250, spread: 360, scalar: 1.5, origin: {x:0.68,y:0.5} });
}

function launchConfetti2() {
  confetti({
    particleCount: 250,
    spread: 360,
    ticks: 200,
    scalar: 1.5,
    origin: { x: 0.68, y: 0.5 },
    colors: ['#FFD700', '#FFC300', '#FFEA00', '#FFF8DC']
  });
}

function launchConfetti3() {
  confetti({
    particleCount: 350,
    spread: 360,
    scalar: 1.5,
    origin: { x: 0.68, y: 0.5 },
    colors: ['#0033FF', '#007BFF', '#00BFFF']
  });
}

function scaleToScreen() {
  const baseWidth = 1250;
  const scale = Math.min(
    window.innerWidth / baseWidth,
    window.innerHeight / 800
  ) * 0.9;

  document.getElementById("master").style.transform = `scale(${scale})`;
}

window.addEventListener("resize", scaleToScreen);
window.addEventListener("load", scaleToScreen);
</script>
